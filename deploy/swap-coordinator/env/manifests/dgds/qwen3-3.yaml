apiVersion: nvidia.com/v1alpha1
kind: DynamoGraphDeployment
metadata:
  name: qwen3-3
  namespace: swap
  labels:
    runai/queue: swap
  annotations:
    swap-coordinator/min-warm-workers: "2"
    swap-coordinator/max-warm-workers: "2"
spec:
  services:

    Frontend:
      labels:
        runai/queue: swap
      componentType: frontend
      extraPodMetadata:
        labels:
          runai/queue: swap
      replicas: 1
      envs:
        # Route requests to the Router (swap_aware_router), not directly to workers
        - name: DYN_ROUTER_MODE
          value: round-robin
      extraPodSpec:
        mainContainer:
          image: dynamo:latest-vllm-runtime
          imagePullPolicy: Never
          name: ""
          resources: {}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
        nodeSelector:
          run.ai/swap-enabled: 'true'
        schedulerName: runai-scheduler
        securityContext:
          seccompProfile:
            type: RuntimeDefault

    Router:
      labels:
        runai/queue: swap
      componentType: router
      replicas: 1
      extraPodMetadata:
        labels:
          runai/queue: swap
      extraPodSpec:
        mainContainer:
          image: dynamo:latest-vllm-runtime
          imagePullPolicy: Never
          name: ""
          env:
          - name: DYN_LOG
            value: "info,dynamo.swap_aware_router=debug"
          command:
          - python3
          - -m
          - dynamo.swap_aware_router
          args:
          - --endpoint
          - swap-qwen3-3.backend.generate
          - --router-namespace
          - swap-qwen3-3
          - --swap-aware-routing
          - --swap-coordinator-url
          - http://swap-coordinator-service.dynamo-system.svc.cluster.local:8080
          - --swap-coordinator-timeout
          - "1.0"
          - --register-model
          - --model-name
          - Qwen/Qwen3-0.6B
          resources: {}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
        nodeSelector:                                                                                                                                                   
          run.ai/swap-enabled: 'true'
        schedulerName: runai-scheduler
        securityContext:
          seccompProfile:
            type: RuntimeDefault

    vLLMWorker:
      labels:
        runai/queue: swap
      componentType: worker
      envFromSecret: hf-token-secret
      replicas: 4
      extraPodMetadata:
        annotations:
          gpu-fraction: "0.3"
      extraPodSpec:
        mainContainer:
          env:
          - name: VLLM_ENGINE_ITERATION_TIMEOUT_S
            value: "120"
          - name: RUNAI_GPU_MEMORY_LIMIT
            value: "1.0"
          - name: RUNAI_SWAP_MAX_BLOCK_SIZE_MB
            value: "512"
          image: dynamo:latest-vllm-runtime
          imagePullPolicy: Never
          name: ""
          workingDir: /workspace/
          command:
          - python3
          - -m
          - dynamo.vllm
          args:
          - --model
          - Qwen/Qwen3-0.6B
          - --served-model-name
          - Qwen/Qwen3-0.6B-worker
          # - --publish-events-and-metrics
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
        nodeSelector:                                                                                                                                                   
          run.ai/swap-enabled: 'true'
        affinity:
          podAntiAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  nvidia.com/selector: qwen3-3-vllmworker
              topologyKey: kubernetes.io/hostname
        schedulerName: runai-scheduler
        securityContext:
          seccompProfile:
            type: RuntimeDefault
        tolerations:
        - effect: NoSchedule
          key: nvidia.com/gpu
          operator: Exists
        volumes:                                                                                                                                                        
        - emptyDir: {}                                                                                                                                                  
          name: triton-cache