apiVersion: nvidia.com/v1alpha1
kind: DynamoGraphDeployment
metadata:
  name: qwen3-2
  namespace: swap
  labels:
    runai/queue: swap
  annotations:
    swap-coordinator/min-warm-workers: "2"
    swap-coordinator/max-warm-workers: "2"
spec:
  services:

    Frontend:
      labels:
        runai/queue: swap
      componentType: frontend
      extraPodMetadata:
        labels:
          runai/queue: swap
          swap-coordinator/frontend: qwen3-2
      replicas: 1
      envs:
        # Route requests to the Router (swap_aware_router), not directly to workers
        - name: DYN_ROUTER_MODE
          value: round-robin
      extraPodSpec:
        mainContainer:
          image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:1.0.1
          imagePullPolicy: IfNotPresent
          name: ""
          resources: {}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
        nodeSelector:
          run.ai/swap-enabled: 'true'
        schedulerName: runai-scheduler
        securityContext:
          seccompProfile:
            type: RuntimeDefault

    Router:
      labels:
        runai/queue: swap
      componentType: router
      replicas: 1
      extraPodMetadata:
        labels:
          runai/queue: swap
      extraPodSpec:
        mainContainer:
          image: vllm-runtime:1.0.1-swap
          imagePullPolicy: IfNotPresent
          name: ""
          env:
          - name: DYN_LOG
            value: "info,dynamo.swap_aware_router=debug"
          command:
          - python3
          - -m
          - dynamo.swap_aware_router
          args:
          - --endpoint
          - swap-qwen3-2.backend.generate
          - --router-namespace
          - swap-qwen3-2
          - --swap-aware-routing
          - --swap-coordinator-url
          - http://swap-coordinator-service.swap.svc.cluster.local:8080
          - --swap-coordinator-timeout
          - "1.0"
          - --register-model
          - --model-name
          - Qwen/Qwen3-0.6B
          - --block-size
          - "16"
          resources: {}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
          volumeMounts:
          - name: swap-router-code
            mountPath: /opt/dynamo/venv/lib/python3.12/site-packages/dynamo/swap_aware_router
        nodeSelector:
          run.ai/swap-enabled: 'true'
        schedulerName: runai-scheduler
        securityContext:
          seccompProfile:
            type: RuntimeDefault
        volumes:
        - name: swap-router-code
          configMap:
            name: swap-router-code

    vLLMWorker:
      labels:
        runai/queue: swap
      componentType: worker
      envFromSecret: hf-token-secret
      replicas: 4
      extraPodMetadata:
        labels:
          runai/queue: swap
          model: qwen3-2
        annotations:
          gpu-fraction: "0.3"
          gpu-fraction-num-devices: "3"
      extraPodSpec:
        mainContainer:
          env:
          - name: VLLM_ENGINE_ITERATION_TIMEOUT_S
            value: "120"
          - name: RUNAI_GPU_MEMORY_LIMIT
            value: "1.0"
          - name: RUNAI_SWAP_MAX_BLOCK_SIZE_MB
            value: "512"
          image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:1.0.1
          imagePullPolicy: IfNotPresent
          name: ""
          workingDir: /workspace/
          command:
          - python3
          - -m
          - dynamo.vllm
          args:
          - --model
          - Qwen/Qwen3-0.6B
          - --served-model-name
          - Qwen/Qwen3-0.6B-worker
          - --kv-events-config 
          - '{"enable_kv_cache_events":true,"publisher":"zmq","endpoint":"tcp://*:20080"}'
          - --block-size
          - "16"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
        nodeSelector:                                                                                                                                                   
          run.ai/swap-enabled: 'true'
        affinity:
          podAntiAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  model: qwen3-2
              topologyKey: kubernetes.io/hostname
        schedulerName: runai-scheduler
        securityContext:
          seccompProfile:
            type: RuntimeDefault
        tolerations:
        - effect: NoSchedule
          key: nvidia.com/gpu
          operator: Exists
        volumes:
        - emptyDir: {}
          name: triton-cache
---
apiVersion: v1
kind: Service
metadata:
  name: qwen3-2-frontend-nodeport
  namespace: swap
spec:
  type: NodePort
  selector:
    swap-coordinator/frontend: qwen3-2
  ports:
  - name: http
    port: 8000
    targetPort: 8000
    nodePort: 30082
    protocol: TCP