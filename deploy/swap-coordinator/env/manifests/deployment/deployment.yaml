apiVersion: apps/v1
kind: Deployment
metadata:
  name: swap-coordinator
  namespace: swap
  labels:
    app: swap-coordinator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: swap-coordinator
  template:
    metadata:
      labels:
        app: swap-coordinator
    spec:
      nodeSelector:
        run.ai/swap-enabled: 'true'
      serviceAccountName: swap-coordinator
      containers:
      - name: swap-coordinator
        image: swap-coordinator:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        env:
        - name: LOG_LEVEL
          value: "INFO"
        - name: HTTP_PORT
          value: "8080"
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
            scheme: HTTP
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
            scheme: HTTP
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          successThreshold: 1
          failureThreshold: 3
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          runAsUser: 1000
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
