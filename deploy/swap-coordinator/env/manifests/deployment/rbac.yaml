apiVersion: v1
kind: ServiceAccount
metadata:
  name: swap-coordinator
  namespace: dynamo-system
  labels:
    app: swap-coordinator
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: swap-coordinator-role
  labels:
    app: swap-coordinator
rules:
- apiGroups:
  - ""
  resources:
  - pods
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - ""
  resources:
  - pods/log
  verbs:
  - get
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: swap-coordinator-binding
  labels:
    app: swap-coordinator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: swap-coordinator-role
subjects:
- kind: ServiceAccount
  name: swap-coordinator
  namespace: dynamo-system
