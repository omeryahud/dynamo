apiVersion: v1
kind: ServiceAccount
metadata:
  name: swap-coordinator
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: swap-coordinator-role
rules:
- apiGroups:
  - ai-dynamo.nvidia.com
  resources:
  - dynamoworkermetadatas
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - ""
  resources:
  - pods
  verbs:
  - get
  - list
  - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: swap-coordinator-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: swap-coordinator-role
subjects:
- kind: ServiceAccount
  name: swap-coordinator
  namespace: default
